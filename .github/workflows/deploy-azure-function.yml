name: Deploy Azure Function

on:
  workflow_call:
    inputs:
      dotnet_version:
        description: "Version of .NET SDK to use (e.g., '10.x')"
        type: string
        required: true
      tenant_id:
        description: "Azure Tenant ID"
        type: string
        required: true
      subscription_id:
        description: "Azure Subscription ID"
        type: string
        required: true
      client_id:
        description: "Azure Client ID"
        type: string
        required: true
      function_app_name:
        description: "Name of the Azure Function App to deploy"
        type: string
        required: true
      environment:
        description: "Deployment environment (e.g., 'staging', 'production')"
        type: string
        default: "production"
        required: false
      funcignore:
        description: "Respect the .funcignore file during deployment"
        type: boolean
        default: false
        required: false
      nuget_source_name:
        description: "Name of the NuGet package source (used in NuGetPackageSourceCredentials_{name}). Leave empty to skip NuGet authentication."
        type: string
        required: false
        default: ""
      project_path:
        description: "Relative path to the .csproj file to build and publish"
        type: string
        required: true
    secrets:
      github_pat:
        description: "GitHub Personal Access Token. Use GitHubs ${{ secrets.GITHUB_TOKEN }} here. Required when nuget_source_name is set."
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: read
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Build and publish
        env:
          NUGET_SOURCE_NAME: ${{ inputs.nuget_source_name }}
          NUGET_USERNAME: ${{ github.actor }}
          NUGET_PASSWORD: ${{ secrets.github_pat }}
        shell: pwsh
        run: |
          if ($env:NUGET_SOURCE_NAME) {
            $credentials = "Username=$($env:NUGET_USERNAME);Password=$($env:NUGET_PASSWORD)"
            Set-Item -Path "Env:NuGetPackageSourceCredentials_$($env:NUGET_SOURCE_NAME)" -Value $credentials
          }
          dotnet publish "${{ inputs.project_path }}" --configuration Release --output ./publish

      - name: Login to Azure (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ inputs.client_id }}
          tenant-id: ${{ inputs.tenant_id }}
          subscription-id: ${{ inputs.subscription_id }}

      - name: Deploy function app
        uses: azure/functions-action@02a16c5f3a5707fa97fca56c202cc2ef6cc7dccb # v1.5.4
        with:
          app-name: ${{ inputs.function_app_name }}
          package: ./publish
          respect-funcignore: ${{ inputs.funcignore }}
